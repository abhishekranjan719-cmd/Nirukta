# ============================================================================
# LiteLLM Proxy Configuration
# ============================================================================
# Configuration for LiteLLM proxy with Azure OpenAI and Azure AI models
# Updated: 2025-12-31
# ============================================================================

model_list:
  # Azure OpenAI - Chat Model
  - model_name: gpt-5-mini
    litellm_params:
      model: azure/cypher-gpt-5-mini
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_version: "2024-12-01-preview"
    model_info:
      mode: chat
      supports_function_calling: true
      supports_vision: false

  # Azure OpenAI - Embedding Model
  - model_name: text-embedding-ada-002
    litellm_params:
      model: azure/cypher-ada-002
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_version: "2024-12-01-preview"
    model_info:
      mode: embedding
      input_cost_per_token: 0.00002

# ============================================================================
# General Settings
# ============================================================================
general:
  # Master key for admin access (must start with sk-)
  master_key: os.environ/LITELLM_MASTER_KEY

  # Database configuration
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 100
  database_connection_timeout: 60

  # Store model in db
  store_model_in_db: true

# ============================================================================
# LiteLLM Settings
# ============================================================================
litellm_settings:
  # Logging
  json_logs: true
  drop_params: true
  set_verbose: false

  # Request tracking
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

  # Caching
  cache: true
  cache_params:
    type: "redis"
    host: "redis-stack"
    port: 6379
    db: 2
    ttl: 3600

  # Fallbacks
  num_retries: 3
  request_timeout: 600
  fallbacks: []

# ============================================================================
# Environment Settings
# ============================================================================
environment_variables:
  # Langfuse Integration
  LANGFUSE_PUBLIC_KEY: os.environ/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY: os.environ/LANGFUSE_SECRET_KEY
  LANGFUSE_HOST: "http://langfuse-web:3000"

  # Azure credentials
  AZURE_OPENAI_API_KEY: os.environ/AZURE_OPENAI_API_KEY
  AZURE_OPENAI_ENDPOINT: os.environ/AZURE_OPENAI_ENDPOINT
  AZURE_AI_API_KEY: os.environ/AZURE_AI_API_KEY
  AZURE_AI_API_BASE: os.environ/AZURE_AI_API_BASE

# ============================================================================
# Router Settings
# ============================================================================
router_settings:
  routing_strategy: "simple-shuffle"
  model_group_alias: {}
  num_retries: 3
  timeout: 600
  redis_host: "redis-stack"
  redis_port: 6379
  redis_db: 2
