version: '3.9'

services:
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports: ["3000:80"]
    depends_on: [backend]

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports: ["8000:8000"]
    env_file: ../../backend/.env
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
